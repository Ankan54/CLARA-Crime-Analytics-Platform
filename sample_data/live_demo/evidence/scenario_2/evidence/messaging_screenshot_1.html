.header { background: #075e54; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
</style>
</head>

</div>

<p>Transfer to UPI imran.transactions@axl for guaranteed 3x returns.</p>
<div class="timestamp">14:25</div>
</div>
<div class="chat-box from-me">

<div class="timestamp">14:27</div>
</div>

</html>
