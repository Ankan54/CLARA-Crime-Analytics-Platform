<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { font-family: Arial, sans-serif; background: #e5ddd5; padding: 20px; max-width: 400px; }
.chat-box { background: white; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
.from-them { background: #fff; margin-right: 20%; }
.from-me { background: #dcf8c6; margin-left: 20%; }
.timestamp { font-size: 10px; color: #999; text-align: right; }
.header { background: #075e54; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
</style>
</head>
<body>
<div class="header">TaskEarn Support +9000000000</div>
<div class="chat-box from-them">
<p>Welcome to TaskEarn Pro! Complete simple tasks and earn.</p>
<div class="timestamp">09:01</div>
</div>
<div class="chat-box from-them">
<p>Task 1: Rate this product. Earn Rs 200.</p>
<div class="timestamp">09:05</div>
</div>
<div class="chat-box from-me">
<p>Done! When will I receive payment?</p>
<div class="timestamp">09:10</div>
</div>
<div class="chat-box from-them">
<p>To unlock payout you need to deposit Rs 5000 first.</p>
<div class="timestamp">09:12</div>
</div>
<div class="chat-box from-me">
<p>Okay, I will transfer.</p>
<div class="timestamp">09:14</div>
</div>
</body>
</html>
